apiVersion: batch/v1
kind: CronJob
metadata:
  name: factorio-restic-backup
spec:
  schedule: "17 */12 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app.kubernetes.io/name: factorio
            app.kubernetes.io/component: backup
        spec:
          restartPolicy: OnFailure
          containers:
            - name: restic
              image: restic/restic:latest
              imagePullPolicy: IfNotPresent
              command:
                - sh
                - -c
                - |
                  set -eu
                  restic snapshots >/dev/null 2>&1 || restic init
                  restic backup /factorio --tag factorio --tag applications --tag truenas-nfs
                  restic forget --prune --keep-daily 7 --keep-weekly 5 --keep-monthly 12 --keep-yearly 5
              env:
                - name: RESTIC_REPOSITORY
                  value: s3:http://garage.applications.svc.cluster.local:3900/factorio-backup
                - name: RESTIC_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: factorio-secrets
                      key: restic-password
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: factorio-secrets
                      key: aws-access-key-id
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: factorio-secrets
                      key: aws-secret-access-key
              resources:
                requests:
                  cpu: 200m
                  memory: 256Mi
                limits:
                  memory: 1Gi
              volumeMounts:
                - name: data
                  mountPath: /factorio
                  readOnly: true
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: factorio-data
