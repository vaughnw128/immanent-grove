apiVersion: apps/v1
kind: Deployment
metadata:
  name: factorio
  labels:
    app.kubernetes.io/name: factorio
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: factorio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: factorio
    spec:
      initContainers:
        - name: prepare-data
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -eu
              mkdir -p /factorio/config /factorio/saves /factorio/mods
              game_password="$(tr -d '\r\n' < /secrets/game-password | sed 's/\\/\\\\/g; s/"/\\"/g; s/[\/&]/\\&/g')"
              sed "s/\"game_password\": \"\"/\"game_password\": \"$game_password\"/" /config/server-settings.json > /factorio/config/server-settings.json
              cp /secrets/rcon-password /factorio/config/rconpw
              chmod 600 /factorio/config/rconpw
              chown -R 845:845 /factorio
          volumeMounts:
            - name: data
              mountPath: /factorio
            - name: secrets
              mountPath: /secrets
              readOnly: true
            - name: config
              mountPath: /config
              readOnly: true
      containers:
        - name: factorio
          image: factoriotools/factorio:2.1.12
          imagePullPolicy: Always
          env:
            - name: PUID
              value: "845"
            - name: PGID
              value: "845"
            - name: PORT
              value: "34197"
            - name: RCON_PORT
              value: "27015"
            - name: LOAD_LATEST_SAVE
              value: "true"
          ports:
            - name: game
              containerPort: 34197
              protocol: UDP
            - name: rcon
              containerPort: 27015
              protocol: TCP
          resources:
            requests:
              cpu: 2000m
              memory: 2Gi
            limits:
              memory: 6Gi
          volumeMounts:
            - name: data
              mountPath: /factorio
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: factorio-data
        - name: secrets
          secret:
            secretName: factorio-secrets
        - name: config
          configMap:
            name: factorio-config
