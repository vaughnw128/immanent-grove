apiVersion: apps/v1
kind: Deployment
metadata:
  name: factorio
  labels:
    app.kubernetes.io/name: factorio
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: factorio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: factorio
    spec:
      initContainers:
        - name: prepare-data
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -eu
              mkdir -p /factorio/config /factorio/saves /factorio/mods
              cp /secrets/rcon-password /factorio/config/rconpw
              chmod 600 /factorio/config/rconpw
              chown -R 845:845 /factorio
          volumeMounts:
            - name: data
              mountPath: /factorio
            - name: secrets
              mountPath: /secrets
              readOnly: true
      containers:
        - name: factorio
          image: factoriotools/factorio:stable
          imagePullPolicy: Always
          env:
            - name: PUID
              value: "845"
            - name: PGID
              value: "845"
            - name: PORT
              value: "34197"
            - name: RCON_PORT
              value: "27015"
            - name: LOAD_LATEST_SAVE
              value: "true"
          ports:
            - name: game
              containerPort: 34197
              protocol: UDP
            - name: rcon
              containerPort: 27015
              protocol: TCP
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              memory: 6Gi
          volumeMounts:
            - name: data
              mountPath: /factorio
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: factorio-data
        - name: secrets
          secret:
            secretName: factorio-secrets
