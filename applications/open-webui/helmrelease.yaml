apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: open-webui
  namespace: applications
spec:
  interval: 30m
  releaseName: open-webui
  chart:
    spec:
      reconcileStrategy: ChartVersion
      chart: open-webui
      version: "12.13.0"
      sourceRef:
        kind: HelmRepository
        name: open-webui
        namespace: applications
      interval: 12h
  values:
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi

    ollama:
      enabled: false

    pipelines:
      enabled: false

    enableOpenaiApi: true
    openaiBaseApiUrls:
      - "http://litellm:4000/v1"
      - "http://localai-local-ai:80/v1"

    extraEnvVars:
      - name: DATABASE_URL
        valueFrom:
          secretKeyRef:
            name: open-webui-pg-app
            key: uri

    persistence:
      enabled: true
      size: 2Gi

    service:
      type: ClusterIP
      port: 80
      containerPort: 8080
