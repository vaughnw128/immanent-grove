apiVersion: apps/v1
kind: Deployment
metadata:
  name: garage-cdn-proxy
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: garage-cdn-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: garage-cdn-proxy
    spec:
      containers:
        - name: caddy
          image: caddy:2.10.2-alpine
          imagePullPolicy: IfNotPresent
          args:
            - caddy
            - run
            - --config
            - /etc/caddy/Caddyfile
            - --adapter
            - caddyfile
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /etc/caddy
              readOnly: true
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: garage-cdn-proxy-config
---
apiVersion: v1
kind: Service
metadata:
  name: garage-cdn-proxy
spec:
  selector:
    app.kubernetes.io/name: garage-cdn-proxy
  ports:
    - name: http
      port: 80
      targetPort: http
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: garage-web
spec:
  selector:
    app.kubernetes.io/instance: garage
    app.kubernetes.io/name: garage
  ports:
    - name: web
      port: 3902
      targetPort: 3902
  type: ClusterIP
