apiVersion: v1
kind: ConfigMap
metadata:
  name: garage-cdn-proxy-config
data:
  Caddyfile: |
    {
      auto_https off
    }

    :8080 {
      encode zstd gzip

      @gif path *.gif
      header @gif Content-Type "image/gif"
      header @gif Content-Disposition "inline"

      @png path *.png
      header @png Content-Type "image/png"
      header @png Content-Disposition "inline"

      @jpg path *.jpg *.jpeg
      header @jpg Content-Type "image/jpeg"
      header @jpg Content-Disposition "inline"

      @webp path *.webp
      header @webp Content-Type "image/webp"
      header @webp Content-Disposition "inline"

      @svg path *.svg
      header @svg Content-Type "image/svg+xml"
      header @svg Content-Disposition "inline"

      @legacy_cdn_embed {
        host s3.vaughn.sh
        path_regexp legacy_cdn_embed ^/cdn/embed/(.+)$
      }
      handle @legacy_cdn_embed {
        redir https://cdn.vaughn.sh/embed/{re.legacy_cdn_embed.1} 308
      }

      @legacy_cdn {
        host s3.vaughn.sh
        path_regexp legacy_cdn ^/cdn/(.+)$
      }
      handle @legacy_cdn {
        uri strip_prefix /cdn
        reverse_proxy garage-web:3902 {
          header_up Host cdn.web.garage.internal.vw-ops.net
        }
      }

      @legacy_root {
        host s3.vaughn.sh
        path_regexp legacy_root ^/(.+)$
      }
      handle @legacy_root {
        redir https://cdn.vaughn.sh/{re.legacy_root.1} 308
      }

      @discord_embed path_regexp discord_embed ^/embed/(.+)$
      handle @discord_embed {
        vars object_path {re.discord_embed.1}
        header Content-Type "text/html; charset=utf-8"
        respond 200 <<HTML
        <!doctype html>
        <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <meta property="og:type" content="website">
            <meta property="og:title" content="{vars.object_path}">
            <meta property="og:image" content="https://cdn.vaughn.sh/{vars.object_path}">
            <meta name="twitter:card" content="summary_large_image">
            <meta name="twitter:image" content="https://cdn.vaughn.sh/{vars.object_path}">
            <meta http-equiv="refresh" content="0; url=/{vars.object_path}">
          </head>
          <body>
            <a href="/{vars.object_path}">{vars.object_path}</a>
          </body>
        </html>
        HTML
      }

      @cdn_host host cdn.vaughn.sh
      handle @cdn_host {
        reverse_proxy garage-web:3902 {
          header_up Host cdn.web.garage.internal.vw-ops.net
        }
      }

      respond 404
    }
