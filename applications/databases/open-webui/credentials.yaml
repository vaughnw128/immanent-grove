apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: open-webui-pg-app
spec:
  refreshInterval: "24h"
  target:
    name: open-webui-pg-app
    creationPolicy: Owner
    template:
      metadata:
        labels:
          cnpg.io/reload: "true"
      data:
        username: "open-webui-app"
        password: "{{ .password }}"
        uri: "postgresql://open-webui-app:{{ .password | urlquery }}@grove-cluster-rw.applications.svc.cluster.local:5432/open-webui"
        uri-pooler-rw: "postgresql://open-webui-app:{{ .password | urlquery }}@grove-cluster-pooler-rw.applications.svc.cluster.local:5432/open-webui"
        uri-pooler-rw-lb: "postgresql://open-webui-app:{{ .password | urlquery }}@grove-cluster-pooler-rw.internal.vw-ops.net:5432/open-webui"
        uri-pooler-ro: "postgresql://open-webui-app:{{ .password | urlquery }}@grove-cluster-pooler-ro.applications.svc.cluster.local:5432/open-webui"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: ClusterGenerator
          name: cluster-generator
