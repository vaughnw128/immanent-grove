apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
spec:
  interval: 30m
  releaseName: jellyfin
  chart:
    spec:
      reconcileStrategy: ChartVersion
      chart: jellyfin
      version: "3.2.0"
      sourceRef:
        kind: HelmRepository
        name: jellyfin
      interval: 12h
  values:
    replicaCount: 1
    revisionHistoryLimit: 2

    image:
      repository: docker.io/jellyfin/jellyfin
      tag: 10.11.8
      pullPolicy: IfNotPresent

    service:
      type: ClusterIP
      port: 8096

    ingress:
      enabled: false

    httpRoute:
      enabled: true
      parentRefs:
        - name: default-gateway
          namespace: default
      hostnames:
        - jellytwo.internal.vw-ops.net
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /

    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        memory: 4Gi

    jellyfin:
      env:
        - name: TZ
          value: America/New_York

    persistence:
      config:
        enabled: true
        accessMode: ReadWriteMany
        size: 50Gi
        storageClass: truenas-nfs
      media:
        enabled: true
        type: pvc
        existingClaim: jellyfin-media
      cache:
        enabled: false
