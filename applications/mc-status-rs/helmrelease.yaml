apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mc-status-rs
spec:
  interval: 5m
  releaseName: mc-status-rs
  chart:
    spec:
      reconcileStrategy: ChartVersion
      chart: mc-status-rs
      version: "*"
      sourceRef:
        kind: HelmRepository
        name: mc-status-rs
      valuesFiles:
        - "values.yaml"
      interval: 5m
