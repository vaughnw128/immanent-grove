apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: discsync
spec:
  interval: 5m
  releaseName: discsync
  chart:
    spec:
      reconcileStrategy: ChartVersion
      chart: discsync
      version: "*"
      sourceRef:
        kind: HelmRepository
        name: discsync
      interval: 5m
