apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: video-proxy-cloudflare
spec:
  ingressClassName: cloudflare-tunnel
  rules:
  - host: videos.vaughn.sh
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: video-proxy
            port:
              number: 80
