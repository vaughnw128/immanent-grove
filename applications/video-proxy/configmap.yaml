apiVersion: v1
kind: ConfigMap
metadata:
  name: video-proxy
data:
  Caddyfile: |
    {
      admin off
      auto_https off
    }

    :8080 {
      encode zstd gzip
      templates

      @video_page path /v/*
      handle @video_page {
        rewrite * /video.html
        root * /srv
        file_server
      }
    
      respond "not found" 404
    }

  video.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">

      {{$path := .OriginalReq.URL.Path}}
      {{if not $path}}
        {{$path = .Req.URL.Path}}
      {{end}}

      {{$videoName := trimPrefix "/v/" $path}}
      {{$videoUrl := printf "https://%s/videos/%s" .Host $videoName}}
      {{$fallbackImage := "https://s3.vaughn.sh/cdn/server-icon.png"}}

      <title>{{$videoName}}</title>
      <meta property="og:type" content="video.other">
      <meta property="og:title" content="{{$videoName}}">
      <meta property="og:description" content="Click to watch">
      <meta property="og:url" content="https://{{.Host}}{{.OriginalReq.URL.Path}}">

      <meta property="og:image" content="{{$fallbackImage}}">

      <meta property="og:video" content="{{$videoUrl}}">
      <meta property="og:video:url" content="{{$videoUrl}}">
      <meta property="og:video:secure_url" content="{{$videoUrl}}">
      <meta property="og:video:type" content="video/mp4">
      <meta property="og:video:width" content="1280">
      <meta property="og:video:height" content="720">

      <meta name="twitter:card" content="player">
      <meta name="twitter:title" content="{{$videoName}}">
      <meta name="twitter:image" content="{{$fallbackImage}}">
      <meta name="twitter:player" content="https://{{.Host}}{{.OriginalReq.URL.Path}}">
      <meta name="twitter:player:width" content="1280">
      <meta name="twitter:player:height" content="720">
      <meta name="twitter:player:stream" content="{{$videoUrl}}">
      <meta name="twitter:player:stream:content_type" content="video/mp4">

      <style>
        html, body { height: 100%; }
        body { margin: 0; background: #000; }
        .wrap { height: 100%; display: grid; place-items: center; }
        video { width: 100%; max-width: 100vw; max-height: 100vh; height: auto; object-fit: contain; }
      </style>
    </head>
    <body>
      <div class="wrap">
        <video controls playsinline preload="metadata">
          <source src="{{$videoUrl}}" type="video/mp4">
        </video>
      </div>
    </body>
    </html>
