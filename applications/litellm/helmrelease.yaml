apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: litellm
  namespace: applications
spec:
  interval: 5m
  releaseName: litellm
  chart:
    spec:
      reconcileStrategy: ChartVersion
      chart: litellm-helm
      version: "0.1.825"
      sourceRef:
        kind: HelmRepository
        name: litellm
      interval: 5m
  values:
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
    masterkeySecretName: "litellm-secrets"
    masterkeySecretKey: "master-key"
    proxyConfigMap:
      create: true
    proxy_config:
#      model_list:
#        - model_name: text-embedding-qwen3-embedding-0.6b
#          litellm_params:
#            model: openai/text-embedding-qwen3-embedding-0.6b
#            api_key: "n/a"
#            api_base: http://localai-local-ai.applications.svc.cluster.local:80/v1
#            drop_params: true
      general_settings:
        master_key: os.environ/PROXY_MASTER_KEY
