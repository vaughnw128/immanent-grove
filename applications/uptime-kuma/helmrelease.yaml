apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: uptime-kuma
  namespace: applications
spec:
  interval: 30m
  chart:
    spec:
      reconcileStrategy: Revision
      chart: uptime-kuma
      version: "2.21.3"
      sourceRef:
        kind: HelmRepository
        name: uptime-kuma
        namespace: applications
      interval: 12h
  values:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    image:
      repository: louislam/uptime-kuma
      tag: 2.1.0-beta.3
    mariadb:
      enabled: true