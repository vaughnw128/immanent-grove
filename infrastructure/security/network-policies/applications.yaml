# Network policies for the applications namespace.
# Default-deny ingress from outside the cluster, then explicit allows for
# intra-namespace, gateway proxies, and monitoring scrapes.
#
# Cilium enters policy enforcement mode for an endpoint as soon as any
# CiliumNetworkPolicy selects it. Since all policies below use
# endpointSelector: {} (match all), every pod in the namespace is enrolled
# automatically — no explicit default-deny policy is needed.
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: applications
spec:
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: applications
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: applications
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEntities:
        - world
        - kube-apiserver
---
# Allow Cilium Gateway API / Envoy to reach application backends.
# Cilium's envoy runs as part of the agent on the host network, so traffic
# from the gateway proxy appears as the 'host' entity, not a kube-system pod.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-gateway-ingress
  namespace: applications
spec:
  endpointSelector: {}
  ingress:
    - fromEntities:
        - ingress
        - host
        - remote-node
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
---
# Allow the CNPG operator to reach instance pods for status checks and management
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-cnpg-operator
  namespace: applications
spec:
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: cnpg-system
---
# Allow external traffic to reach LoadBalancer services (e.g. Minecraft, Postgres).
# L2 LB traffic from LAN clients can be classified differently depending on
# the packet path through Cilium's eBPF datapath:
#   - world: standard external client
#   - cluster: traffic NATed through a node
#   - host: traffic arriving via the node's host network stack (L2 announcement)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-loadbalancer-ingress
  namespace: applications
spec:
  endpointSelector: {}
  ingress:
    - fromEntities:
        - world
        - cluster
        - host
---
# Allow the Cloudflare Tunnel controller to reach
# application backends (e.g. BlueMap via maps.vaughn.sh)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-cloudflare-tunnel
  namespace: applications
spec:
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: controllers
---
# Allow Prometheus to scrape application pods
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-monitoring-scrape
  namespace: applications
spec:
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: monitoring
