# Network policies for the applications namespace.
# Default-deny ingress from outside the cluster, then explicit allows for
# intra-namespace, gateway proxies, and monitoring scrapes.
#
# Default-deny is achieved via the idiomatic Cilium pattern: applying a policy
# with an ingress section selects endpoints into policy enforcement, causing all
# ingress not explicitly allowed by any policy to be dropped. This avoids
# ingressDeny rules which take precedence over allow rules and would block
# legitimate traffic like API server webhook calls.
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: applications
spec:
  endpointSelector: {}
  ingress: []
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: applications
spec:
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: applications
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: applications
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEntities:
        - world
        - kube-apiserver
---
# Allow Gateway API envoy proxies (kube-system) to reach application backends
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-gateway-ingress
  namespace: applications
spec:
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
---
# Allow the CNPG operator to reach instance pods for status checks and management
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-cnpg-operator
  namespace: applications
spec:
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: cnpg-system
---
# Allow external traffic to reach LoadBalancer services (e.g. Minecraft, Postgres).
# LAN clients hitting a LoadBalancer IP are classified as 'world' by Cilium.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-loadbalancer-ingress
  namespace: applications
spec:
  endpointSelector: {}
  ingress:
    - fromEntities:
        - world
---
# Allow the Cloudflare Tunnel controller (controllers namespace) to reach
# application backends (e.g. BlueMap via maps.vaughn.sh)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-cloudflare-tunnel
  namespace: applications
spec:
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: controllers
---
# Allow Prometheus to scrape application pods
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-monitoring-scrape
  namespace: applications
spec:
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: monitoring
