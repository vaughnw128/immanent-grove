# Network policies for the operators namespace.
# Operators (external-secrets, 1password-connect, etc.) need to be reachable
# from applications and gateway proxies.
#
# Default-deny is achieved via the idiomatic Cilium pattern: applying a policy
# with an ingress section selects endpoints into policy enforcement, causing all
# ingress not explicitly allowed by any policy to be dropped. This avoids
# ingressDeny rules which take precedence over allow rules and would block
# legitimate traffic like API server webhook calls.
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: operators
spec:
  endpointSelector: {}
  ingress: []
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: operators
spec:
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: operators
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: operators
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEntities:
        - world
        - kube-apiserver
---
# Allow applications to reach operators (e.g. external-secrets, 1password-connect)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-from-applications
  namespace: operators
spec:
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: applications
---
# Allow Cilium Gateway API / Envoy to reach operator backends (1password-connect).
# Cilium's envoy runs on the host network, so traffic appears as 'host' entity.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-gateway-ingress
  namespace: operators
spec:
  endpointSelector: {}
  ingress:
    - fromEntities:
        - host
        - remote-node
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
---
# Allow the Kubernetes API server to reach operator webhooks
# (external-secrets validating/mutating webhooks).
# On Talos the API server runs on the host network.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-apiserver-webhooks
  namespace: operators
spec:
  endpointSelector: {}
  ingress:
    - fromEntities:
        - host
        - remote-node
        - kube-apiserver
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
---
# Allow Prometheus to scrape operator pods
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-monitoring-scrape
  namespace: operators
spec:
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: monitoring
