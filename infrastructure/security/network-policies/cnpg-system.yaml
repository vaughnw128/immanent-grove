# Network policies for the cnpg-system namespace.
# PostgreSQL instances need to be reachable from applications and scrapeable
# by Prometheus.
#
# Default-deny is achieved via the idiomatic Cilium pattern: applying a policy
# with an ingress section selects endpoints into policy enforcement, causing all
# ingress not explicitly allowed by any policy to be dropped. This avoids
# ingressDeny rules which take precedence over allow rules and would block
# legitimate traffic like API server webhook calls.
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: cnpg-system
spec:
  endpointSelector: {}
  ingress: []
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: cnpg-system
spec:
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: cnpg-system
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: cnpg-system
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEntities:
        - world
---
# Allow applications to connect to postgres
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-from-applications
  namespace: cnpg-system
spec:
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: applications
---
# Allow the Kubernetes API server to reach CNPG webhooks.
# On Talos Linux the API server runs on the host network so it appears as
# the 'host' entity or from kube-system.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-apiserver-webhooks
  namespace: cnpg-system
spec:
  endpointSelector: {}
  ingress:
    - fromEntities:
        - host
        - remote-node
        - kube-apiserver
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
---
# Allow Prometheus to scrape CNPG metrics
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-monitoring-scrape
  namespace: cnpg-system
spec:
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: monitoring
